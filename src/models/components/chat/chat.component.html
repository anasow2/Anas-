

<div class="relative flex h-screen flex-col bg-white dark:bg-background-dark overflow-hidden shadow-2xl md:max-w-3xl md:mx-auto md:border-x md:border-slate-200 md:dark:border-slate-800">
  <!-- Top Navigation Bar -->
  <header class="sticky top-0 z-20 flex flex-col bg-white/90 dark:bg-background-dark/90 backdrop-blur-lg border-b border-slate-200 dark:border-slate-800">
    <div class="flex items-center p-4 justify-between">
      <div class="flex items-center gap-3">
        <a [routerLink]="['/home']" class="text-navy-custom dark:text-white hover:bg-slate-100 dark:hover:bg-slate-800 p-1 rounded-full transition-colors">
          <span class="material-symbols-outlined text-[28px]">arrow_back_ios_new</span>
        </a>
        <div class="relative">
          <div class="bg-center bg-no-repeat aspect-square bg-cover rounded-full w-10 border-2 border-primary/50 flex items-center justify-center bg-primary/10 text-primary">
            <span class="material-symbols-outlined">support_agent</span>
          </div>
          <div class="absolute bottom-0 right-0 w-3 h-3 bg-primary border-2 border-white dark:border-background-dark rounded-full"></div>
        </div>
        <div class="flex flex-col">
          <h2 class="text-navy-custom dark:text-white text-base font-bold leading-tight tracking-tight">Sahal AI Assistant</h2>
          <p class="text-primary text-[12px] font-medium leading-none">Online</p>
        </div>
      </div>
      <div class="flex items-center gap-2">
        <button class="text-slate-500 dark:text-slate-400 p-2 hover:bg-slate-100 dark:hover:bg-slate-800 rounded-full">
          <span class="material-symbols-outlined">info</span>
        </button>
      </div>
    </div>
  </header>
  
  <!-- Message List -->
  <main #chatContainer class="flex-1 overflow-y-auto p-4 space-y-4 bg-slate-50 dark:bg-sahal-blue">
    @for(message of messages(); track $index) {
      @if (message.role === 'model') {
        <!-- AI Message -->
        <div class="flex items-end gap-2 max-w-[85%]">
          <div class="flex flex-col gap-1">
            <div class="bg-slate-200 dark:bg-surface-dark text-slate-800 dark:text-slate-200 p-3 rounded-2xl rounded-bl-none shadow-sm">
              <p class="text-[15px] leading-relaxed">{{ message.text }}</p>
            </div>
          </div>
        </div>
      } @else {
        <!-- User Message -->
        <div class="flex items-end justify-end gap-2 ml-auto max-w-[85%]">
          <div class="flex flex-col gap-1 items-end">
            <div class="bg-primary text-white p-3 rounded-2xl rounded-br-none shadow-sm font-medium">
              <p class="text-[15px] leading-relaxed">{{ message.text }}</p>
            </div>
          </div>
        </div>
      }
    }
    @if(isLoading() && messages()[messages().length - 1].text === '') {
      <!-- Typing Indicator -->
      <div class="flex items-end gap-2 max-w-[85%]">
        <div class="flex flex-col gap-1">
          <div class="bg-slate-200 dark:bg-surface-dark p-3 rounded-2xl rounded-bl-none shadow-sm">
            <div class="flex items-center gap-1.5">
              <div class="size-1.5 bg-primary rounded-full animate-pulse"></div>
              <div class="size-1.5 bg-primary rounded-full animate-pulse [animation-delay:0.2s]"></div>
              <div class="size-1.5 bg-primary rounded-full animate-pulse [animation-delay:0.4s]"></div>
            </div>
          </div>
        </div>
      </div>
    }
  </main>

  <!-- Bottom Controls -->
  <footer class="p-4 bg-white dark:bg-background-dark border-t border-slate-200 dark:border-slate-800">
    <div class="flex items-center gap-2">
      <div class="relative flex-1">
        <input #userInput (keydown.enter)="sendMessage(userInput)" [disabled]="isLoading()" class="w-full bg-slate-100 dark:bg-sahal-blue border-none rounded-full py-2.5 px-4 text-[15px] focus:ring-2 focus:ring-primary/50 placeholder:text-slate-500 text-slate-900 dark:text-white" placeholder="Qor farriin..." type="text"/>
      </div>
      <button (click)="sendMessage(userInput)" [disabled]="isLoading()" class="flex items-center justify-center w-10 h-10 rounded-full bg-primary text-white shadow-md shadow-primary/20 hover:scale-105 active:scale-95 transition-all disabled:opacity-50 disabled:scale-100">
        <span class="material-symbols-outlined">send</span>
      </button>
    </div>
  </footer>
</div>
