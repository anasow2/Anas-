
<div class="pb-24">
  <!-- Top App Bar / Header -->
  <header class="bg-white dark:bg-background-dark px-4 md:px-12 pt-4 pb-6 sticky top-0 z-40 border-b border-slate-200 dark:border-slate-800 shadow-sm">
    <div class="flex items-center justify-between mb-4">
      <div class="flex items-center gap-1">
        <span class="text-navy-custom dark:text-white text-2xl font-extrabold tracking-tight">SA</span>
        <span class="text-primary text-2xl font-extrabold tracking-tight">HAL</span>
      </div>
      <div class="flex items-center gap-3">
        <button [routerLink]="['/notifications']" class="relative w-10 h-10 flex items-center justify-center bg-slate-100 dark:bg-slate-800 rounded-full text-slate-600 dark:text-slate-300 hover:bg-slate-200 dark:hover:bg-slate-700 transition-colors">
          <span class="material-symbols-outlined">notifications</span>
          @if (notificationService.unreadCount() > 0) {
            <span class="absolute top-0 right-0 flex h-4 w-4 items-center justify-center rounded-full bg-red-500 text-[10px] font-bold text-white border-2 border-white dark:border-slate-800">
              {{ notificationService.unreadCount() }}
            </span>
          }
        </button>
        <button [routerLink]="['/profile']" class="w-10 h-10 flex items-center justify-center bg-slate-100 dark:bg-slate-800 rounded-full text-slate-600 dark:text-slate-300 overflow-hidden border border-slate-200 dark:border-slate-700 hover:bg-slate-200 dark:hover:bg-slate-700 transition-colors">
          <span class="material-symbols-outlined">person</span>
        </button>
      </div>
    </div>
    <!-- Search Bar -->
    <div class="relative">
      <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
        <span class="material-symbols-outlined text-gray-500 dark:text-gray-400">search</span>
      </div>
      <input class="block w-full pl-10 pr-4 py-3 bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-xl text-slate-900 dark:text-white placeholder-slate-500 dark:placeholder-slate-400 focus:ring-2 focus:ring-primary text-sm shadow-sm transition-colors" placeholder="Maxaad raadineysaa?" type="text"/>
    </div>
  </header>

  <!-- Main Content Container -->
  <main>
    <!-- Categories Horizontal Scroll -->
    <section class="py-6 overflow-hidden md:px-8">
      <div class="flex px-4 overflow-x-auto gap-4 hide-scrollbar">
        @for(category of categories(); track category.name) {
          <div class="flex flex-col items-center gap-2 min-w-[72px] shrink-0">
            <div class="w-16 h-16 bg-primary/10 rounded-2xl flex items-center justify-center text-primary border border-primary/20">
              <span class="material-symbols-outlined text-3xl">{{ category.icon }}</span>
            </div>
            <span class="text-xs font-semibold text-slate-600 dark:text-gray-200">{{ category.name }}</span>
          </div>
        }
      </div>
    </section>

    <!-- New Ads Section -->
    <section class="px-4 md:px-12">
      <div class="flex items-center justify-between mb-4">
        <h2 class="text-lg font-bold text-navy-custom dark:text-white">Xayeysiin cusub</h2>
        <a class="text-primary text-sm font-semibold" href="#">Dhammaan</a>
      </div>
      <!-- Ads Grid -->
      <div class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 gap-4">
        @for (ad of ads(); track ad.id) {
          <app-ad-card [ad]="ad"></app-ad-card>
        }
      </div>
    </section>
  </main>

  <!-- Bottom Navigation Bar (iOS Style) -->
  <nav class="fixed bottom-0 left-0 right-0 max-w-7xl mx-auto bg-white/80 dark:bg-background-dark/80 backdrop-blur-lg border-t border-slate-200 dark:border-white/10 pb-6 pt-2 px-6 z-50 md:px-12">
    <div class="flex items-center justify-between">
      <button [routerLink]="['/home']" class="flex flex-col items-center gap-1 text-primary">
        <span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1">home</span>
        <span class="text-[10px] font-bold uppercase">Hoyga</span>
      </button>
      <button [routerLink]="['/favorites']" class="flex flex-col items-center gap-1 text-slate-400">
        <span class="material-symbols-outlined">favorite</span>
        <span class="text-[10px] font-medium uppercase">Jacaylka</span>
      </button>
      <button [routerLink]="['/add-listing']" class="flex flex-col items-center gap-1">
        <div class="w-12 h-12 bg-primary rounded-full flex items-center justify-center text-navy-custom -mt-8 shadow-lg shadow-primary/40 ring-4 ring-background-light dark:ring-background-dark">
          <span class="material-symbols-outlined text-3xl">add</span>
        </div>
        <span class="text-[10px] font-bold text-primary uppercase mt-1">Dhig Ad</span>
      </button>
      <button [routerLink]="['/messages']" class="flex flex-col items-center gap-1 text-slate-400">
        <span class="material-symbols-outlined">chat_bubble</span>
        <span class="text-[10px] font-medium uppercase">Fariimo</span>
      </button>
      <button [routerLink]="['/profile']" class="flex flex-col items-center gap-1 text-slate-400">
        <span class="material-symbols-outlined">account_circle</span>
        <span class="text-[10px] font-medium uppercase">Profile</span>
      </button>
    </div>
  </nav>
</div>
