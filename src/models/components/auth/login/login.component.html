<div class="relative flex h-full min-h-screen w-full flex-col bg-white dark:bg-background-dark p-6 md:max-w-md md:mx-auto md:my-12 md:rounded-2xl md:border md:border-slate-200 md:dark:border-slate-800 md:shadow-2xl md:min-h-[calc(100vh-6rem)]">
  <header class="flex items-center">
    <a [routerLink]="['/welcome']" class="text-navy-custom dark:text-white flex size-10 items-center justify-center rounded-full hover:bg-slate-100 dark:hover:bg-sahal-blue transition-colors">
      <span class="material-symbols-outlined">arrow_back_ios_new</span>
    </a>
  </header>

  <main class="flex-1 flex flex-col justify-center">
    <div class="text-center mb-10">
      <h1 class="text-3xl font-extrabold text-navy-custom dark:text-white">Soo Gal Koontadaada</h1>
      <p class="text-slate-500 dark:text-slate-400 mt-2">Waan ku faraxsanahay inaan dib kuu aragno!</p>
    </div>

    <div class="space-y-4">
      <div class="flex flex-col gap-2">
        <label class="text-navy-custom dark:text-white text-sm font-semibold">Email</label>
        <input #emailInput class="form-input w-full rounded-xl text-navy-custom dark:text-white border border-slate-300 dark:border-sahal-blue bg-white dark:bg-sahal-blue focus:border-primary focus:ring-2 focus:ring-primary/20 h-14 px-4 text-base font-medium transition-all" placeholder="your@email.com" type="email" value="user@sahal.com"/>
      </div>
      <div class="flex flex-col gap-2">
        <label class="text-navy-custom dark:text-white text-sm font-semibold">Password</label>
        <input #passwordInput class="form-input w-full rounded-xl text-navy-custom dark:text-white border border-slate-300 dark:border-sahal-blue bg-white dark:bg-sahal-blue focus:border-primary focus:ring-2 focus:ring-primary/20 h-14 px-4 text-base font-medium transition-all" placeholder="••••••••" type="password" value="password123"/>
      </div>
    </div>
    
    <div class="text-right mt-4">
        <a href="#" class="text-sm font-semibold text-primary no-underline">Ma illowday Password-ka?</a>
    </div>

    <div class="mt-8">
      <button (click)="login(emailInput, passwordInput)" class="flex w-full h-14 items-center justify-center rounded-xl bg-primary text-white text-lg font-bold tracking-tight shadow-lg shadow-primary/30 hover:brightness-110 active:scale-[0.98] transition-all">
        Soo Gal
      </button>
    </div>

    <div class="text-center mt-6">
      <p class="text-sm text-slate-500 dark:text-slate-400">
        Akoon ma lihid? <a [routerLink]="['/signup']" class="font-bold text-primary no-underline">Is Diiwaangeli</a>
      </p>
    </div>
  </main>
</div>
